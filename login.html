<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            var currentPath = window.location.pathname;
            var isLoginPage = currentPath.includes('login.html') || currentPath.endsWith('/login');
            var isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            if (!isLoggedIn && !isLoginPage) {
                window.location.replace('/login.html');
            } else if (isLoggedIn && isLoginPage) {
                window.location.replace('/');
            }
        })();
    </script>
    <title>碳路者·青碳行 - 登录与认证</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans SC', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-init.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/auth.js"></script>
    <style>
        body { background: #e2e8f0; }
    </style>
</head>
<body data-page="login">
    <div class="phone-container">
        <!-- Logo 和标题 -->
        <div class="mt-20 flex flex-col items-center px-8">
            <div class="w-20 h-20 bg-emerald-500 rounded-3xl flex items-center justify-center shadow-lg">
                <i class="ph-bold ph-leaf text-white text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mt-6 italic">碳路者 · 青碳行</h1>
            <p class="text-gray-400 text-sm mt-2">绿色校园，低碳生活</p>
        </div>

        <!-- 登录表单 -->
        <div class="mt-12 space-y-6 px-8">
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-500 ml-1">手机号码</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-gray-400 text-sm">+86</span>
                    <input id="phone-input" class="w-full bg-gray-50 border-none rounded-2xl py-3.5 pl-14 pr-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="输入手机号" type="text"/>
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-500 ml-1">验证码</label>
                <div class="relative">
                    <input id="code-input" class="w-full bg-gray-50 border-none rounded-2xl py-3.5 px-4 text-sm focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="输入6位验证码" type="text"/>
                    <button id="send-code-btn" class="absolute right-3 top-2 text-xs font-bold text-emerald-600 bg-white px-3 py-2 rounded-xl border border-emerald-100 cursor-pointer">获取验证码</button>
                </div>
            </div>
            <div class="pt-2">
                <a id="login-btn" class="block w-full bg-emerald-500 text-white text-center py-4 rounded-2xl font-bold shadow-lg shadow-emerald-100 cursor-pointer hover:bg-emerald-600 transition-colors" href="#">
                    立即登录
                </a>
            </div>
        </div>

        <!-- 校园认证入口 -->
        <div class="mt-10 mx-8 p-5 bg-emerald-50 rounded-3xl border border-emerald-100">
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm font-bold text-emerald-800">校园实名认证</span>
                <span class="text-[10px] bg-emerald-200 text-emerald-700 px-2 py-0.5 rounded-full">未认证</span>
            </div>
            <p class="text-xs text-emerald-600 mb-4 leading-relaxed">认证学生身份，解锁专属碳积分加成、校园竞赛及奖学金兑换资格。</p>
            <a href="school-cert.html" class="block w-full bg-emerald-500 text-white text-center py-3 rounded-xl font-bold text-sm shadow-md">立即认证</a>
        </div>

        <!-- 用户协议 -->
        <div class="absolute bottom-10 left-0 w-full px-8 text-center">
            <div class="flex items-center justify-center space-x-2 text-[10px] text-gray-400">
                <input id="agree-checkbox" class="rounded text-emerald-500 focus:ring-0 cursor-pointer" type="checkbox"/>
                <span>我已阅读并同意 <a class="text-emerald-600" href="#">《用户服务协议》</a> 与 <a class="text-emerald-600" href="#">《隐私保护政策》</a></span>
            </div>
        </div>
    </div>
</body>
</html>
