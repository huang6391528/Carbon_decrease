<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>绿动校园 - 校园跑</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { font-family: sans-serif; background-color: #f0f4f8; }
        .comic-card { background: white; border: 2px solid #333; border-radius: 20px; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); }
        .map-sim { background-color: #e8f5e9; background-image: radial-gradient(#81c784 1px, transparent 1px); background-size: 20px 20px; }
        .track-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: dash 5s linear forwards infinite; }
        @keyframes dash { to { stroke-dashoffset: 0; } }
        .tab-btn.active { background: #FF9D5C; color: white; border-color: #333; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">
<div class="relative w-[375px] h-[812px] bg-white overflow-hidden border-[8px] border-gray-800 rounded-[3rem] shadow-2xl">
<!-- 顶部导航 -->
<header class="pt-12 px-6">
<div class="flex bg-gray-100 p-1 rounded-2xl border-2 border-gray-800">
<button class="flex-1 py-2 text-sm font-bold rounded-xl tab-btn active">自由跑</button>
<button class="flex-1 py-2 text-sm font-bold text-gray-500 rounded-xl">晨跑计划</button>
<button class="flex-1 py-2 text-sm font-bold text-gray-500 rounded-xl">训练营</button>
</div>
</header>
<!-- 地图区域 -->
<main class="h-[630px] overflow-y-auto pb-20 no-scrollbar">
<section class="mx-6 mt-6 h-64 comic-card relative overflow-hidden map-sim">
<div class="absolute inset-0 flex items-center justify-center">
<svg height="100%" viewbox="0 0 300 200" width="100%">
<path class="track-line" d="M 50 150 Q 150 50 250 150" fill="transparent" stroke="#4ADE80" stroke-width="4"></path>
<circle cx="50" cy="150" fill="#FF9D5C" r="6" stroke="#333" stroke-width="2"></circle>
<circle cx="250" cy="150" fill="#4ADE80" r="6" stroke="#333" stroke-width="2"></circle>
</svg>
</div>
<div class="absolute top-4 left-4 bg-white/80 backdrop-blur px-3 py-1 rounded-full border border-gray-800 text-[10px] font-bold">
                    📍 图书馆东侧
                </div>
<div class="absolute bottom-4 right-4 bg-orange-500 text-white p-2 rounded-full border border-gray-800 animate-bounce">
<iconify-icon icon="line-md:navigation-twotone" width="20"></iconify-icon>
</div>
</section>
<!-- 实时数据 -->
<section class="mx-6 mt-6 grid grid-cols-2 gap-4">
<div class="comic-card p-4 text-center">
<p class="text-[10px] text-gray-500 font-bold uppercase">时长</p>
<p class="text-2xl font-black text-gray-800">00:15:24</p>
</div>
<div class="comic-card p-4 text-center border-green-500 bg-green-50">
<p class="text-[10px] text-gray-500 font-bold uppercase">距离 (km)</p>
<p class="text-2xl font-black text-green-600">2.45</p>
</div>
<div class="comic-card p-4 text-center">
<p class="text-[10px] text-gray-500 font-bold uppercase">平均配速</p>
<p class="text-2xl font-black text-gray-800">6'12''</p>
</div>
<div class="comic-card p-4 text-center">
<p class="text-[10px] text-gray-500 font-bold uppercase">碳减排 (g)</p>
<p class="text-2xl font-black text-orange-500">324.5</p>
</div>
</section>
<!-- 操作按钮 -->
<section class="mx-6 mt-6 flex justify-center items-center gap-8">
<button class="w-16 h-16 rounded-full comic-card flex items-center justify-center bg-gray-100">
<iconify-icon icon="line-md:close" width="24"></iconify-icon>
</button>
<button class="w-24 h-24 rounded-full border-4 border-gray-800 shadow-[6px_6px_0px_#333] flex items-center justify-center bg-orange-400 active:translate-x-1 active:translate-y-1 active:shadow-none transition-all">
<iconify-icon class="text-white" icon="line-md:play-filled" width="40"></iconify-icon>
</button>
<button class="w-16 h-16 rounded-full comic-card flex items-center justify-center bg-gray-100">
<iconify-icon icon="line-md:image-twotone" width="24"></iconify-icon>
</button>
</section>
<!-- 总里程与日历 -->
<section class="mx-6 mt-10 p-4 comic-card bg-yellow-50">
<div class="flex justify-between items-center mb-4">
<h3 class="font-bold text-gray-800">本月晨跑日历</h3>
<span class="text-xs text-orange-600 font-bold">总计 45.2 km</span>
</div>
<div class="grid grid-cols-7 gap-2 text-center">
<!-- 模拟日历 -->
<div class="text-[10px] font-bold text-gray-400">一</div>
<div class="text-[10px] font-bold text-gray-400">二</div>
<div class="text-[10px] font-bold text-gray-400">三</div>
<div class="text-[10px] font-bold text-gray-400">四</div>
<div class="text-[10px] font-bold text-gray-400">五</div>
<div class="text-[10px] font-bold text-gray-400 text-orange-500">六</div>
<div class="text-[10px] font-bold text-gray-400 text-orange-500">日</div>
<div class="h-8 flex items-center justify-center text-xs text-gray-300">30</div>
<div class="h-8 flex items-center justify-center text-xs text-gray-300">31</div>
<div class="h-8 flex items-center justify-center comic-card border-none bg-green-400 text-white font-bold scale-110">1</div>
<div class="h-8 flex items-center justify-center text-xs text-gray-400 font-bold">2</div>
<div class="h-8 flex items-center justify-center comic-card border-none bg-green-400 text-white font-bold">3</div>
<div class="h-8 flex items-center justify-center text-xs text-gray-400 font-bold">4</div>
<div class="h-8 flex items-center justify-center comic-card border-none bg-orange-400 text-white font-bold ring-2 ring-orange-200">5</div>
</div>
<p class="text-[10px] text-gray-500 mt-4 text-center">💡 今天天气晴朗，适宜在西操场跑步哦！</p>
</section>
</main>
<!-- 底部导航栏 -->
<nav class="absolute bottom-0 w-full h-20 bg-white border-t-2 border-gray-800 flex justify-around items-center px-2 z-20">
<a class="flex flex-col items-center gap-1 text-gray-400" href="index.html">
<iconify-icon icon="line-md:home-md" width="24"></iconify-icon>
<span class="text-[10px]">首页</span>
</a>
<a class="flex flex-col items-center gap-1 tab-active" href="run.html">
<iconify-icon icon="line-md:run-all" width="24"></iconify-icon>
<span class="text-[10px]">校园跑</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="carbon.html">
<iconify-icon icon="line-md:leaf" width="24"></iconify-icon>
<span class="text-[10px]">低碳</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="shop.html">
<iconify-icon icon="line-md:shopping-cart" width="24"></iconify-icon>
<span class="text-[10px]">商城</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="profile.html">
<iconify-icon icon="line-md:account" width="24"></iconify-icon>
<span class="text-[10px]">我的</span>
</a>
</nav>
</div>
</body>
</html>
