<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>碳数据明细 - 碳路者</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/echarts.min.5.4.3.js"></script>
<style>
        .phone-container {
            width: 375px;
            height: 812px;
            margin: 0 auto;
            position: relative;
            background: #F8FAFC;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 8px solid #1E293B;
            border-radius: 40px;
        }
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .scrollable-content::-webkit-scrollbar { display: none; }
        .chart-container {
            width: 100%;
            height: 200px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-200">
<div class="phone-container">
<!-- Header -->
<div class="px-4 pt-12 pb-4 bg-white flex items-center justify-between border-b border-gray-50">
<a class="w-10 h-10 flex items-center justify-center" href="index.html">
<iconify-icon class="text-2xl text-gray-800" icon="solar:alt-arrow-left-outline"></iconify-icon>
</a>
<h1 class="text-lg font-bold text-gray-800">减排明细</h1>
<div class="w-10 h-10"></div>
</div>
<div class="scrollable-content">
<!-- Weekly Chart Section -->
<div class="p-4">
<div class="bg-white rounded-3xl p-4 shadow-sm">
<div class="flex justify-between items-center mb-4">
<h2 class="text-xs font-bold text-gray-500">本周减排趋势 (kg)</h2>
<div class="bg-green-50 text-green-600 text-[10px] px-2 py-1 rounded-full font-bold">
                            总计 8.52kg
                        </div>
</div>
<div class="chart-container" id="trendChart"></div>
</div>
</div>
<!-- Stats Breakdown -->
<div class="px-4 mt-2">
<div class="grid grid-cols-3 gap-3">
<div class="bg-green-50 rounded-2xl p-3 text-center">
<div class="text-[9px] text-green-600 mb-1">步行减排</div>
<div class="text-sm font-black text-green-800">4.2kg</div>
</div>
<div class="bg-blue-50 rounded-2xl p-3 text-center">
<div class="text-[9px] text-blue-600 mb-1">骑行减排</div>
<div class="text-sm font-black text-blue-800">2.8kg</div>
</div>
<div class="bg-orange-50 rounded-2xl p-3 text-center">
<div class="text-[9px] text-orange-600 mb-1">回收打卡</div>
<div class="text-sm font-black text-orange-800">1.5kg</div>
</div>
</div>
</div>
<!-- Activity List (Timeline Style) -->
<div class="px-4 mt-8">
<h2 class="text-sm font-black text-gray-800 mb-4 px-1">最近动态</h2>
<div class="space-y-6 relative before:absolute before:left-4 before:top-2 before:bottom-0 before:w-0.5 before:bg-gray-100">
<!-- Item 1 -->
<div class="relative pl-10">
<div class="absolute left-2.5 top-1.5 w-3 h-3 bg-green-500 rounded-full border-2 border-white ring-4 ring-green-100"></div>
<div class="bg-white p-4 rounded-2xl shadow-sm">
<div class="flex justify-between items-start">
<div>
<h4 class="text-xs font-bold text-gray-800">光盘行动打卡</h4>
<p class="text-[10px] text-gray-400 mt-1">今天 12:30 · 第五食堂</p>
</div>
<div class="text-green-600 font-black text-xs">+0.05kg</div>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="relative pl-10">
<div class="absolute left-2.5 top-1.5 w-3 h-3 bg-blue-500 rounded-full border-2 border-white ring-4 ring-blue-100"></div>
<div class="bg-white p-4 rounded-2xl shadow-sm">
<div class="flex justify-between items-start">
<div>
<h4 class="text-xs font-bold text-gray-800">校园单车骑行 2.4km</h4>
<p class="text-[10px] text-gray-400 mt-1">今天 08:45 · 宿舍-教学楼</p>
</div>
<div class="text-green-600 font-black text-xs">+0.32kg</div>
</div>
</div>
</div>
<!-- Item 3 -->
<div class="relative pl-10">
<div class="absolute left-2.5 top-1.5 w-3 h-3 bg-orange-500 rounded-full border-2 border-white ring-4 ring-orange-100"></div>
<div class="bg-white p-4 rounded-2xl shadow-sm">
<div class="flex justify-between items-start">
<div>
<h4 class="text-xs font-bold text-gray-800">废弃塑料瓶回收</h4>
<p class="text-[10px] text-gray-400 mt-1">昨天 17:20 · 环保驿站</p>
</div>
<div class="text-green-600 font-black text-xs">+0.15kg</div>
</div>
</div>
</div>
<!-- Item 4 -->
<div class="relative pl-10">
<div class="absolute left-2.5 top-1.5 w-3 h-3 bg-gray-300 rounded-full border-2 border-white ring-4 ring-gray-50"></div>
<div class="bg-white p-4 rounded-2xl shadow-sm">
<div class="flex justify-between items-start">
<div>
<h4 class="text-xs font-bold text-gray-800">步数自动结算 (8,420步)</h4>
<p class="text-[10px] text-gray-400 mt-1">昨天 23:59 · 系统自动同步</p>
</div>
<div class="text-green-600 font-black text-xs">+0.84kg</div>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
<script>
        // Initialize ECharts
        const chartDom = document.getElementById('trendChart');
        const myChart = echarts.init(chartDom);
        const option = {
            grid: { top: 10, left: 30, right: 10, bottom: 20 },
            xAxis: {
                type: 'category',
                data: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                axisLine: { show: false },
                axisTick: { show: false },
                axisLabel: { textStyle: { color: '#94a3b8', fontSize: 10 } }
            },
            yAxis: {
                type: 'value',
                splitLine: { lineStyle: { type: 'dashed', color: '#f1f5f9' } },
                axisLabel: { textStyle: { color: '#94a3b8', fontSize: 10 } }
            },
            series: [{
                data: [1.2, 0.8, 1.5, 2.1, 1.3, 0.9, 0.7],
                type: 'bar',
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#22c55e' },
                        { offset: 1, color: '#86efac' }
                    ]),
                    borderRadius: [4, 4, 0, 0]
                },
                barWidth: '40%'
            }]
        };
        myChart.setOption(option);
    </script>
</body>
</html>
