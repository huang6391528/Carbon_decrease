<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碳路者·青碳行 - 积分商城</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans SC', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .tab-active { color: #10B981; }
    </style>
</head>
<body data-page="mall">
    <div class="phone-container">
        <!-- 搜索栏 (原型样式) -->
        <div class="px-6 pt-12 pb-4 bg-white flex items-center space-x-3">
            <div class="flex-1 bg-gray-100 rounded-2xl px-4 py-2 flex items-center space-x-2">
                <i class="ph-bold ph-magnifying-glass text-gray-400"></i>
                <input class="bg-transparent text-xs border-none outline-none w-full" placeholder="搜索环保好物" type="text"/>
            </div>
            <a href="cart.html" class="relative">
                <i class="ph-bold ph-shopping-cart text-2xl text-gray-600"></i>
                <span class="cart-badge absolute -top-1 -right-1 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </a>
        </div>

        <!-- 可滚动内容区 -->
        <div class="h-[650px] overflow-y-auto pb-24">
            <!-- 积分余额卡 -->
            <div class="mx-4 mt-2 bg-gradient-to-r from-slate-800 to-slate-900 rounded-3xl p-6 text-white shadow-xl flex justify-between items-center">
                <div>
                    <div class="text-[10px] text-slate-400 mb-1">当前可用碳积分</div>
                    <div class="text-2xl font-bold carbon-score">1,286</div>
                    <div class="text-[10px] text-emerald-400 mt-2 flex items-center">
                        <i class="ph-bold ph-arrow-up-right mr-1"></i>
                        比昨日增加 65g
                    </div>
                </div>
                <button class="bg-emerald-500 text-white text-[10px] font-bold px-4 py-2 rounded-full shadow-lg shadow-emerald-900/50">去赚积分</button>
            </div>

            <!-- 金刚区分类 -->
            <div class="grid grid-cols-4 gap-4 px-6 mt-6">
                <div class="flex flex-col items-center space-y-1">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-gray-50 cursor-pointer">
                        <i class="ph-bold ph-ticket text-2xl text-red-500"></i>
                    </div>
                    <span class="text-[10px] text-gray-600 font-medium">代金券</span>
                </div>
                <div class="flex flex-col items-center space-y-1">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-gray-50 cursor-pointer">
                        <i class="ph-bold ph-coffee text-2xl text-orange-500"></i>
                    </div>
                    <span class="text-[10px] text-gray-600 font-medium">校园饮品</span>
                </div>
                <div class="flex flex-col items-center space-y-1">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-gray-50 cursor-pointer">
                        <i class="ph-bold ph-backpack text-2xl text-blue-500"></i>
                    </div>
                    <span class="text-[10px] text-gray-600 font-medium">环保周边</span>
                </div>
                <div class="flex flex-col items-center space-y-1">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-gray-50 cursor-pointer">
                        <i class="ph-bold ph-sparkle text-2xl text-emerald-500"></i>
                    </div>
                    <span class="text-[10px] text-gray-600 font-medium">积分抽奖</span>
                </div>
            </div>

            <!-- 限时秒杀 -->
            <div class="px-4 mt-8">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center space-x-2">
                        <h2 class="text-base font-bold text-gray-800">限时秒杀</h2>
                        <span class="bg-red-500 text-white text-[8px] px-1.5 py-0.5 rounded uppercase font-bold">12:00 场</span>
                    </div>
                    <span class="text-xs text-gray-400">更多 &gt;</span>
                </div>
                <div class="flex space-x-4 overflow-x-auto pb-2 scrollbar-hide">
                    <div class="min-w-[120px] bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm cursor-pointer">
                        <img alt="Product" class="w-full h-32 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg"/>
                        <div class="p-2">
                            <h3 class="text-[10px] font-bold text-gray-800 line-clamp-1">瑞幸咖啡5元抵扣券</h3>
                            <div class="flex items-center mt-1">
                                <span class="text-xs font-bold text-red-500">200g</span>
                                <span class="text-[8px] text-gray-400 line-through ml-1">500g</span>
                            </div>
                        </div>
                    </div>
                    <div class="min-w-[120px] bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm cursor-pointer">
                        <img alt="Product" class="w-full h-32 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg"/>
                        <div class="p-2">
                            <h3 class="text-[10px] font-bold text-gray-800 line-clamp-1">环保帆布手提袋</h3>
                            <div class="flex items-center mt-1">
                                <span class="text-xs font-bold text-red-500">800g</span>
                                <span class="text-[8px] text-gray-400 line-through ml-1">1200g</span>
                            </div>
                        </div>
                    </div>
                    <div class="min-w-[120px] bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm cursor-pointer">
                        <img alt="Product" class="w-full h-32 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg"/>
                        <div class="p-2">
                            <h3 class="text-[10px] font-bold text-gray-800 line-clamp-1">图书库VIP周卡</h3>
                            <div class="flex items-center mt-1">
                                <span class="text-xs font-bold text-red-500">150g</span>
                                <span class="text-[8px] text-gray-400 line-through ml-1">300g</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 商品瀑布流 -->
            <div class="px-4 mt-8">
                <h2 class="text-base font-bold text-gray-800 mb-4">为您推荐</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm cursor-pointer" data-id="1" data-price="450">
                        <img alt="Product" class="w-full h-40 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg"/>
                        <div class="p-3">
                            <h3 class="text-xs font-bold text-gray-800 line-clamp-2">可降解竹炭牙刷 4支装 (绿色环保)</h3>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-emerald-600 font-bold text-sm">450g</span>
                                <span class="text-[9px] text-gray-400">已兑 1.2k</span>
                            </div>
                            <button class="cart-btn mt-2 w-full py-1 bg-emerald-50 text-emerald-600 text-[10px] font-bold rounded-lg cursor-pointer" data-id="1">+ 加入购物车</button>
                        </div>
                    </div>
                    <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm cursor-pointer" data-id="2" data-price="300">
                        <img alt="Product" class="w-full h-40 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg"/>
                        <div class="p-3">
                            <h3 class="text-xs font-bold text-gray-800 line-clamp-2">校园食堂无门槛3元券</h3>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-emerald-600 font-bold text-sm">300g</span>
                                <span class="text-[9px] text-gray-400">已兑 4.8k</span>
                            </div>
                            <button class="cart-btn mt-2 w-full py-1 bg-emerald-50 text-emerald-600 text-[10px] font-bold rounded-lg cursor-pointer" data-id="2">+ 加入购物车</button>
                        </div>
                    </div>
                    <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm cursor-pointer" data-id="3" data-price="120">
                        <img alt="Product" class="w-full h-40 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg"/>
                        <div class="p-3">
                            <h3 class="text-xs font-bold text-gray-800 line-clamp-2">"青碳行"限定联名环保杯套</h3>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-emerald-600 font-bold text-sm">120g</span>
                                <span class="text-[9px] text-gray-400">仅剩 12件</span>
                            </div>
                            <button class="cart-btn mt-2 w-full py-1 bg-emerald-50 text-emerald-600 text-[10px] font-bold rounded-lg cursor-pointer" data-id="3">+ 加入购物车</button>
                        </div>
                    </div>
                    <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm cursor-pointer" data-id="4" data-price="1500">
                        <img alt="Product" class="w-full h-40 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg"/>
                        <div class="p-3">
                            <h3 class="text-xs font-bold text-gray-800 line-clamp-2">校园单车包月免费卡</h3>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-emerald-600 font-bold text-sm">1500g</span>
                                <span class="text-[9px] text-gray-400">人气爆款</span>
                            </div>
                            <button class="cart-btn mt-2 w-full py-1 bg-emerald-50 text-emerald-600 text-[10px] font-bold rounded-lg cursor-pointer" data-id="4">+ 加入购物车</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部 TabBar -->
        <div class="absolute bottom-0 w-full h-20 bg-white border-t border-gray-100 px-6 flex justify-between items-center pb-4">
            <a class="flex flex-col items-center text-gray-400" href="index.html">
                <i class="ph-bold ph-house text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">首页</span>
            </a>
            <a class="flex flex-col items-center text-gray-400" href="checkin.html">
                <i class="ph-bold ph-calendar-check text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">打卡</span>
            </a>
            <a class="flex flex-col items-center text-gray-400" href="social.html">
                <i class="ph-bold ph-users-three text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">动态</span>
            </a>
            <a class="flex flex-col items-center tab-active" href="mall.html">
                <i class="ph-bold ph-shopping-bag text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">商城</span>
            </a>
            <a class="flex flex-col items-center text-gray-400" href="profile.html">
                <i class="ph-bold ph-user text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">我的</span>
            </a>
        </div>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
