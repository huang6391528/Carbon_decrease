<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>碳积分商城 - 碳路者</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        .phone-container {
            width: 375px;
            height: 812px;
            margin: 0 auto;
            position: relative;
            background: #F8FAFC;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 8px solid #1E293B;
            border-radius: 40px;
        }
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .scrollable-content::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-200">
<div class="phone-container">
<!-- Header -->
<div class="px-4 pt-12 pb-4 bg-white flex items-center justify-between border-b border-gray-50">
<a class="w-10 h-10 flex items-center justify-center" href="index.html">
<iconify-icon class="text-2xl text-gray-800" icon="solar:alt-arrow-left-outline"></iconify-icon>
</a>
<h1 class="text-lg font-bold text-gray-800">碳积分商城</h1>
<div class="w-10 h-10 flex items-center justify-center">
<iconify-icon class="text-2xl text-green-600" icon="solar:history-bold-duotone"></iconify-icon>
</div>
</div>
<div class="scrollable-content">
<!-- Points Balance Card -->
<div class="p-4">
<div class="bg-gradient-to-br from-orange-400 to-orange-500 rounded-3xl p-6 text-white shadow-lg shadow-orange-200">
<div class="flex justify-between items-center opacity-80 text-xs font-medium">
<span>可用碳积分</span>
<div class="flex items-center gap-1">
<iconify-icon icon="solar:question-circle-bold"></iconify-icon>
                            积分规则
                        </div>
</div>
<div class="text-4xl font-black mt-2">1,280</div>
<div class="mt-4 flex gap-2">
<div class="bg-white/20 px-3 py-1 rounded-full text-[10px]">今日已赚 +45</div>
<div class="bg-white/20 px-3 py-1 rounded-full text-[10px]">即将过期 0</div>
</div>
</div>
</div>
<!-- Categories -->
<div class="flex justify-around py-4 px-2">
<div class="flex flex-col items-center gap-2">
<div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-green-600">
<iconify-icon class="text-2xl" icon="solar:gift-bold"></iconify-icon>
</div>
<span class="text-[10px] font-bold text-gray-600">实物礼品</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
<iconify-icon class="text-2xl" icon="solar:ticket-bold"></iconify-icon>
</div>
<span class="text-[10px] font-bold text-gray-600">生活券包</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-purple-600">
<iconify-icon class="text-2xl" icon="solar:ghost-bold"></iconify-icon>
</div>
<span class="text-[10px] font-bold text-gray-600">虚拟装扮</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center text-orange-600">
<iconify-icon class="text-2xl" icon="solar:crown-bold"></iconify-icon>
</div>
<span class="text-[10px] font-bold text-gray-600">专属特权</span>
</div>
</div>
<!-- Product List -->
<div class="px-4 mt-2">
<div class="flex justify-between items-center mb-4">
<h2 class="text-sm font-black text-gray-800 uppercase tracking-wider">热门兑换</h2>
<div class="text-[10px] text-gray-400 font-medium">按热度排序</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Item 1 -->
<div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
<img alt="Canvas Bag" class="w-full h-32 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/b64263db4de64de68df0628acadfba88.jpg"/>
<div class="p-3">
<h3 class="text-[11px] font-bold text-gray-800 line-clamp-1">低碳校园联名帆布袋</h3>
<div class="flex items-center gap-1 mt-2 text-orange-500 font-black text-xs">
                                500 <span class="text-[9px] font-medium text-gray-400">积分</span>
</div>
<button class="w-full mt-3 bg-green-500 text-white text-[10px] py-1.5 rounded-lg font-bold">立即兑换</button>
</div>
</div>
<!-- Item 2 -->
<div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
<img alt="Canteen Voucher" class="w-full h-32 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/fe954adb1ef54d53badd5c6144a9744b.jpg"/>
<div class="p-3">
<h3 class="text-[11px] font-bold text-gray-800 line-clamp-1">食堂3元减免通用券</h3>
<div class="flex items-center gap-1 mt-2 text-orange-500 font-black text-xs">
                                200 <span class="text-[9px] font-medium text-gray-400">积分</span>
</div>
<button class="w-full mt-3 bg-green-500 text-white text-[10px] py-1.5 rounded-lg font-bold">立即兑换</button>
</div>
</div>
<!-- Item 3 -->
<div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
<img alt="Coffee Cup" class="w-full h-32 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/302405926bdc4da5903127ca75af6e1a.jpg"/>
<div class="p-3">
<h3 class="text-[11px] font-bold text-gray-800 line-clamp-1">环保随行马克杯</h3>
<div class="flex items-center gap-1 mt-2 text-orange-500 font-black text-xs">
                                850 <span class="text-[9px] font-medium text-gray-400">积分</span>
</div>
<button class="w-full mt-3 bg-gray-200 text-gray-500 text-[10px] py-1.5 rounded-lg font-bold" disabled="">积分不足</button>
</div>
</div>
<!-- Item 4 -->
<div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
<img alt="Tree Certificate" class="w-full h-32 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/1235eabd396e4aabbc35a3f56cd0c3c2.jpg"/>
<div class="p-3">
<h3 class="text-[11px] font-bold text-gray-800 line-clamp-1">校园树木挂牌冠名权</h3>
<div class="flex items-center gap-1 mt-2 text-orange-500 font-black text-xs">
                                2,000 <span class="text-[9px] font-medium text-gray-400">积分</span>
</div>
<button class="w-full mt-3 bg-gray-200 text-gray-500 text-[10px] py-1.5 rounded-lg font-bold" disabled="">积分不足</button>
</div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
