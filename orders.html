<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 碳路者·青碳行</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans SC', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body data-page="orders">
    <div class="phone-container">
        <!-- 顶部状态栏 -->
        <div class="bg-white px-4 py-3 flex items-center justify-between border-b border-gray-100">
            <div class="text-gray-400 text-sm">2026年3月29日</div>
            <div class="flex items-center gap-1">
                <i class="ph-bold ph-cell-signal-full text-sm text-gray-600"></i>
                <i class="ph-bold ph-wifi-high text-sm text-gray-600"></i>
                <i class="ph-bold ph-battery-full text-sm text-gray-600"></i>
            </div>
        </div>

        <!-- 可滚动内容区 -->
        <div class="scrollable-content">
            <!-- 页面头部 -->
            <div class="bg-white px-4 pt-4 pb-3">
                <div class="flex items-center justify-between">
                    <a href="profile.html" class="text-gray-600">
                        <i class="ph-bold ph-arrow-left text-xl"></i>
                    </a>
                    <span class="text-gray-800 font-bold text-lg">我的订单</span>
                    <div class="w-6"></div>
                </div>
            </div>

            <!-- 订单状态Tab -->
            <div class="px-4 pb-3 bg-white border-b border-gray-100">
                <div class="flex items-center gap-6">
                    <button class="order-tab active text-emerald-600 font-medium text-sm pb-2 border-b-2 border-emerald-500" data-status="all">全部</button>
                    <button class="order-tab text-gray-400 font-medium text-sm pb-2 border-b-2 border-transparent" data-status="待领取">待领取</button>
                    <button class="order-tab text-gray-400 font-medium text-sm pb-2 border-b-2 border-transparent" data-status="已领取">已领取</button>
                </div>
            </div>

            <!-- 订单列表 -->
            <div class="px-4 pt-4">
                <div id="orders-container" class="pb-4">
                    <!-- 订单会通过JS动态渲染 -->
                </div>

                <!-- 空订单 -->
                <div id="orders-empty" class="hidden text-center py-16">
                    <div class="w-24 h-24 mx-auto bg-gray-100 rounded-full flex items-center justify-center mb-4">
                        <i class="ph-bold ph-receipt text-4xl text-gray-300"></i>
                    </div>
                    <p class="text-gray-500 text-sm mb-4">暂无订单</p>
                    <a href="mall.html" class="inline-block bg-emerald-500 text-white px-6 py-2 rounded-xl text-sm font-medium">
                        去兑换
                    </a>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bg-white border-t border-gray-100 px-4 py-2 flex items-center justify-around">
            <a href="index.html" class="flex flex-col items-center py-1 text-gray-400">
                <i class="ph-bold ph-house text-xl"></i>
                <span class="text-xs mt-0.5">首页</span>
            </a>
            <a href="checkin.html" class="flex flex-col items-center py-1 text-gray-400">
                <i class="ph-bold ph-check-square text-xl"></i>
                <span class="text-xs mt-0.5">打卡</span>
            </a>
            <a href="social.html" class="flex flex-col items-center py-1 text-gray-400">
                <i class="ph-bold ph-users text-xl"></i>
                <span class="text-xs mt-0.5">动态</span>
            </a>
            <a href="mall.html" class="flex flex-col items-center py-1 text-gray-400 relative">
                <i class="ph-bold ph-storefront text-xl"></i>
                <span class="text-xs mt-0.5">商城</span>
                <span class="cart-badge absolute top-0 right-2 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center py-1 tab-active">
                <i class="ph-bold ph-user-circle text-xl"></i>
                <span class="text-xs mt-0.5">我的</span>
            </a>
        </div>
    </div>

    <style>
        .order-tab {
            transition: all 0.2s ease;
        }
    </style>

    <script src="js/mock-data.js"></script>
    <script>
        // 订单Tab切换功能
        (function() {
            document.querySelectorAll('.order-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.order-tab').forEach(t => {
                        t.classList.remove('active', 'text-emerald-600', 'border-emerald-500');
                        t.classList.add('text-gray-400', 'border-transparent');
                    });
                    this.classList.add('active', 'text-emerald-600', 'border-emerald-500');
                    this.classList.remove('text-gray-400', 'border-transparent');

                    // 重新渲染订单列表
                    if (typeof renderOrders === 'function') {
                        renderOrders(this.dataset.status);
                    }
                });
            });

            // 覆写renderOrders函数支持状态筛选
            const originalRenderOrders = window.renderOrders;
            window.renderOrders = function(statusFilter) {
                const container = document.getElementById('orders-container');
                const emptyContainer = document.getElementById('orders-empty');

                if (!container) return;

                // 获取AppState
                let AppState = {};
                try {
                    const saved = localStorage.getItem('carbon_user_state');
                    if (saved) {
                        AppState = JSON.parse(saved);
                    }
                } catch (e) {}

                let orders = AppState.orders || [];

                // 状态筛选
                if (statusFilter && statusFilter !== 'all') {
                    orders = orders.filter(o => o.status === statusFilter);
                }

                if (orders.length === 0) {
                    container.innerHTML = '';
                    emptyContainer?.classList.remove('hidden');
                    return;
                }

                emptyContainer?.classList.add('hidden');

                function getStatusClass(status) {
                    switch (status) {
                        case '待领取': return 'bg-orange-100 text-orange-600';
                        case '已领取': return 'bg-emerald-100 text-emerald-600';
                        case '已完成': return 'bg-gray-100 text-gray-600';
                        default: return 'bg-gray-100 text-gray-600';
                    }
                }

                container.innerHTML = orders.map(order => `
                    <div class="bg-white rounded-2xl p-4 shadow-sm mb-3" data-order-id="${order.id}">
                        <div class="flex items-center justify-between mb-3 pb-3 border-b border-gray-100">
                            <div>
                                <span class="text-gray-400 text-xs">订单号</span>
                                <span class="text-gray-600 text-xs ml-2">${order.id}</span>
                            </div>
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${getStatusClass(order.status)}">${order.status}</span>
                        </div>
                        ${order.items.map(item => `
                            <div class="flex items-center gap-3 mb-3">
                                <img src="${item.image}" alt="${item.name}" class="w-14 h-14 rounded-xl object-cover">
                                <div class="flex-1">
                                    <div class="text-gray-800 text-sm font-medium line-clamp-1">${item.name}</div>
                                    <div class="flex items-center justify-between mt-1">
                                        <span class="text-emerald-600 text-sm font-bold">${item.price}g</span>
                                        <span class="text-gray-400 text-xs">x${item.quantity}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                        <div class="flex items-center justify-between pt-3 border-t border-gray-100">
                            <div>
                                <span class="text-gray-400 text-xs">${order.time}</span>
                            </div>
                            <div class="text-right">
                                <span class="text-gray-500 text-xs">合计：</span>
                                <span class="text-emerald-600 font-bold">${order.totalPrice}g</span>
                            </div>
                        </div>
                        ${order.status === '待领取' ? `
                            <div class="mt-3 flex justify-end">
                                <button class="receive-btn px-4 py-1.5 bg-emerald-500 text-white text-xs rounded-lg font-medium">确认领取</button>
                            </div>
                        ` : ''}
                    </div>
                `).join('');

                // 绑定领取按钮
                container.querySelectorAll('.receive-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const card = this.closest('[data-order-id]');
                        const orderId = card.dataset.orderId;
                        try {
                            const saved = localStorage.getItem('carbon_user_state');
                            if (saved) {
                                AppState = JSON.parse(saved);
                            }
                        } catch (e) {}

                        const order = (AppState.orders || []).find(o => o.id === orderId);
                        if (order) {
                            order.status = '已领取';
                            localStorage.setItem('carbon_user_state', JSON.stringify(AppState));

                            // 显示提示
                            const toast = document.createElement('div');
                            toast.className = 'toast';
                            toast.textContent = '领取成功！';
                            document.body.appendChild(toast);
                            setTimeout(() => toast.remove(), 2000);

                            // 重新渲染
                            window.renderOrders(statusFilter);
                        }
                    });
                });
            };
        })();
    </script>
    <script src="js/app.js"></script>
</body>
</html>
