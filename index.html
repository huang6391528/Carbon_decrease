<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            var currentPath = window.location.pathname;
            var isLoginPage = currentPath.includes('login.html') || currentPath.endsWith('/login');
            var isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            if (!isLoggedIn && !isLoginPage) {
                window.location.replace('/login.html');
            } else if (isLoggedIn && isLoginPage) {
                window.location.replace('/');
            }
        })();
    </script>
    <title>碳路者·青碳行</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans SC', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .energy-ball {
            animation: float 3s ease-in-out infinite;
        }
        body { background: #e2e8f0; }
        .tab-active { color: #10B981; }
    </style>
</head>
<body data-page="index">
    <div class="phone-container">
        <!-- 顶部导航 (原型样式) -->
        <div class="px-6 pt-12 pb-4 flex justify-between items-center bg-emerald-500 text-white">
            <div>
                <h1 class="text-xl font-bold">青碳行</h1>
                <p class="text-xs opacity-80">2026年3月29日 · 晴</p>
            </div>
            <div class="flex space-x-3">
                <a href="announcements.html"><i class="ph-bold ph-bell text-2xl cursor-pointer"></i></a>
                <a href="qrcode.html"><i class="ph-bold ph-qr-code text-2xl cursor-pointer"></i></a>
            </div>
        </div>

        <!-- 可滚动内容区 -->
        <div class="h-[640px] overflow-y-auto pb-24">
            <!-- 轮播图区 -->
            <div class="px-4 mt-4">
                <div class="relative h-32 rounded-2xl overflow-hidden shadow-lg">
                    <img alt="Campus Carbon Activity" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/f5ad22e148574496982b1dea4764e0e5.jpg"/>
                    <div class="absolute bottom-2 left-3 bg-black/40 px-2 py-1 rounded text-[10px] text-white">
                        校园植树节：领养属于你的数字小树
                    </div>
                </div>
            </div>

            <!-- 蚂蚁森林互动区 -->
            <div class="mx-4 mt-4 h-64 bg-gradient-to-b from-emerald-100 to-white rounded-3xl relative overflow-hidden border border-emerald-50">
                <div class="absolute top-4 left-4">
                    <div class="text-xs text-emerald-700 font-medium">当前累计碳积分</div>
                    <div class="text-2xl font-bold text-emerald-900 carbon-score">1,286 <span class="text-sm font-normal">g</span></div>
                </div>
                <!-- 能量球 -->
                <div class="energy-ball absolute top-12 left-20 bg-emerald-400/80 w-12 h-12 rounded-full flex flex-col items-center justify-center text-[10px] text-white cursor-pointer shadow-lg shadow-emerald-200" onclick="this.style.display='none'">
                    <span>+12g</span>
                    <span>步行</span>
                </div>
                <div class="energy-ball absolute top-24 right-12 bg-lime-400/80 w-14 h-14 rounded-full flex flex-col items-center justify-center text-[10px] text-white cursor-pointer shadow-lg shadow-lime-200" onclick="this.style.display='none'" style="animation-delay: 0.5s">
                    <span>+45g</span>
                    <span>地铁</span>
                </div>
                <div class="energy-ball absolute bottom-20 left-10 bg-teal-400/80 w-10 h-10 rounded-full flex flex-col items-center justify-center text-[10px] text-white cursor-pointer shadow-lg shadow-teal-200" onclick="this.style.display='none'" style="animation-delay: 1.2s">
                    <span>+8g</span>
                    <span>回收</span>
                </div>
                <!-- 底部装饰 -->
                <div class="absolute bottom-0 w-full h-24 flex items-end justify-center">
                    <i class="ph-bold ph-tree text-6xl text-emerald-600 mb-2"></i>
                    <i class="ph-bold ph-tree text-4xl text-emerald-500 mb-2 -ml-2"></i>
                    <i class="ph-bold ph-tree text-5xl text-emerald-400 mb-2 -ml-4"></i>
                </div>
            </div>

            <!-- 快捷功能 -->
            <div class="grid grid-cols-4 gap-4 px-6 mt-6">
                <div class="flex flex-col items-center space-y-1">
                    <div class="w-12 h-12 bg-orange-100 rounded-2xl flex items-center justify-center text-orange-600">
                        <i class="ph-bold ph-bicycle text-2xl"></i>
                    </div>
                    <span class="text-[11px] text-gray-600">绿色骑行</span>
                </div>
                <div class="flex flex-col items-center space-y-1">
                    <div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600">
                        <i class="ph-bold ph-recycle text-2xl"></i>
                    </div>
                    <span class="text-[11px] text-gray-600">垃圾分类</span>
                </div>
                <div class="flex flex-col items-center space-y-1">
                    <div class="w-12 h-12 bg-purple-100 rounded-2xl flex items-center justify-center text-purple-600">
                        <i class="ph-bold ph-book-open-text text-2xl"></i>
                    </div>
                    <span class="text-[11px] text-gray-600">低碳科普</span>
                </div>
                <div class="flex flex-col items-center space-y-1">
                    <div class="w-12 h-12 bg-red-100 rounded-2xl flex items-center justify-center text-red-600">
                        <i class="ph-bold ph-hand-heart text-2xl"></i>
                    </div>
                    <span class="text-[11px] text-gray-600">公益捐赠</span>
                </div>
            </div>

            <!-- 低碳科普板块 -->
            <div class="px-4 mt-8">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base font-bold text-gray-800">低碳实验室</h2>
                    <span class="text-xs text-gray-400">查看更多 &gt;</span>
                </div>
                <div class="space-y-4">
                    <a href="article.html" class="flex bg-white p-3 rounded-2xl border border-gray-100 shadow-sm cursor-pointer article-item" data-id="1">
                        <img alt="Article" class="w-20 h-20 rounded-xl object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/0aa1ef5670a94f649ed536b5c1596e70.jpg"/>
                        <div class="ml-3 flex flex-col justify-between">
                            <h3 class="text-sm font-bold text-gray-800 line-clamp-2">为什么少喝一瓶瓶装水能减少 80g 碳排放？</h3>
                            <div class="flex items-center text-[10px] text-gray-400">
                                <i class="ph-bold ph-eye mr-1"></i>
                                <span>1.2k 阅读</span>
                                <span class="mx-2">|</span>
                                <span>科普 · 环境</span>
                            </div>
                        </div>
                    </a>
                    <a href="article.html" class="flex bg-white p-3 rounded-2xl border border-gray-100 shadow-sm cursor-pointer article-item" data-id="2">
                        <img alt="Article" class="w-20 h-20 rounded-xl object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/0aa1ef5670a94f649ed536b5c1596e70.jpg"/>
                        <div class="ml-3 flex flex-col justify-between">
                            <h3 class="text-sm font-bold text-gray-800 line-clamp-2">宿舍节能挑战：每月省电 20% 的实操指南</h3>
                            <div class="flex items-center text-[10px] text-gray-400">
                                <i class="ph-bold ph-eye mr-1"></i>
                                <span>856 阅读</span>
                                <span class="mx-2">|</span>
                                <span>生活 · 节能</span>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <!-- 底部 TabBar -->
        <div class="absolute bottom-0 w-full h-20 bg-white border-t border-gray-100 px-6 flex justify-between items-center pb-4">
            <a class="flex flex-col items-center tab-active" href="index.html">
                <i class="ph-bold ph-house text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">首页</span>
            </a>
            <a class="flex flex-col items-center text-gray-400" href="checkin.html">
                <i class="ph-bold ph-calendar-check text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">打卡</span>
            </a>
            <a class="flex flex-col items-center text-gray-400" href="social.html">
                <i class="ph-bold ph-users-three text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">动态</span>
            </a>
            <a class="flex flex-col items-center text-gray-400 relative" href="mall.html">
                <i class="ph-bold ph-shopping-bag text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">商城</span>
                <span class="cart-badge absolute top-0 right-2 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </a>
            <a class="flex flex-col items-center text-gray-400" href="profile.html">
                <i class="ph-bold ph-user text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">我的</span>
            </a>
        </div>
    </div>

    <script src="js/mock-data.js"></script>
    <script>
        var AppState = {
            completedTasks: [2],
            carbonScore: 1286,
            cartItems: []
        };
    </script>
    <script src="js/app.js"></script>
</body>
</html>
