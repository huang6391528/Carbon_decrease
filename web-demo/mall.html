<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碳积分商城 - 碳路者·青碳行</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans SC', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body data-page="mall">
    <div class="phone-container">
        <!-- 顶部状态栏 -->
        <div class="bg-white px-4 py-3 flex items-center justify-between border-b border-gray-100">
            <div class="text-gray-400 text-sm">2026年3月29日</div>
            <div class="flex items-center gap-1">
                <i class="ph-bold ph-cell-signal-full text-sm text-gray-600"></i>
                <i class="ph-bold ph-wifi-high text-sm text-gray-600"></i>
                <i class="ph-bold ph-battery-full text-sm text-gray-600"></i>
            </div>
        </div>

        <!-- 可滚动内容区 -->
        <div class="scrollable-content">
            <!-- 页面头部 -->
            <div class="bg-white px-4 pt-4 pb-3">
                <div class="flex items-center gap-3">
                    <div class="flex-1 bg-gray-100 rounded-xl px-3 py-2 flex items-center gap-2">
                        <i class="ph-bold ph-magnifying-glass text-gray-400"></i>
                        <input type="text" id="search-input" placeholder="搜索商品" class="bg-transparent outline-none text-sm text-gray-700 flex-1">
                    </div>
                    <div class="relative">
                        <a href="cart.html" class="block">
                            <i class="ph-bold ph-shopping-cart text-gray-600 text-2xl"></i>
                        </a>
                        <span class="cart-badge absolute -top-1 -right-1 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
                    </div>
                </div>
            </div>

            <!-- 用户碳积分 -->
            <div class="px-4 pt-2">
                <div class="bg-gradient-to-r from-emerald-500 to-teal-600 rounded-2xl p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-emerald-100 text-xs mb-1">我的碳积分</div>
                            <div class="text-white text-3xl font-bold carbon-score">1,286</div>
                        </div>
                        <div class="flex items-center gap-2 bg-white/20 rounded-full px-3 py-1.5">
                            <i class="ph-bold ph-leaf text-white text-sm"></i>
                            <span class="text-white text-sm">足够兑换</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 分类导航 -->
            <div class="px-4 pt-4">
                <div class="flex items-center gap-4 overflow-x-auto no-scrollbar">
                    <div class="category-tab flex flex-col items-center flex-shrink-0 ring-2 ring-emerald-500 rounded-full p-1" data-category="全部">
                        <div class="w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center mb-1">
                            <i class="ph-bold ph-storefront text-emerald-600 text-xl"></i>
                        </div>
                        <span class="text-xs text-emerald-600 font-medium">全部</span>
                    </div>
                    <div class="category-tab flex flex-col items-center flex-shrink-0" data-category="餐饮券">
                        <div class="w-12 h-12 rounded-full bg-orange-100 flex items-center justify-center mb-1">
                            <i class="ph-bold ph-cup-hot text-orange-600 text-xl"></i>
                        </div>
                        <span class="text-xs text-gray-600">餐饮券</span>
                    </div>
                    <div class="category-tab flex flex-col items-center flex-shrink-0" data-category="出行">
                        <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center mb-1">
                            <i class="ph-bold ph-bicycle text-blue-600 text-xl"></i>
                        </div>
                        <span class="text-xs text-gray-600">出行</span>
                    </div>
                    <div class="category-tab flex flex-col items-center flex-shrink-0" data-category="环保好物">
                        <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center mb-1">
                            <i class="ph-bold ph-recycle text-green-600 text-xl"></i>
                        </div>
                        <span class="text-xs text-gray-600">环保好物</span>
                    </div>
                    <div class="category-tab flex flex-col items-center flex-shrink-0" data-category="限定礼品">
                        <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center mb-1">
                            <i class="ph-bold ph-gift text-purple-600 text-xl"></i>
                        </div>
                        <span class="text-xs text-gray-600">限定礼品</span>
                    </div>
                </div>
            </div>

            <!-- 热门推荐 -->
            <div class="px-4 pt-4">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-gray-800 font-semibold text-base">热门兑换</span>
                    <span class="text-gray-400 text-xs">查看更多</span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <!-- 商品1 -->
                    <div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm" data-id="1">
                        <div class="relative">
                            <img src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg" alt="商品图片" class="w-full h-28 object-cover">
                            <div class="absolute top-2 left-2 bg-red-500 text-white text-xs px-2 py-0.5 rounded">
                                热销 1200+
                            </div>
                        </div>
                        <div class="p-3">
                            <div class="text-gray-800 text-sm font-medium line-clamp-2 mb-2">可降解竹炭牙刷 4支装 (绿色环保)</div>
                            <div class="flex items-center justify-between">
                                <div>
                                    <span class="text-emerald-600 font-bold">450</span>
                                    <span class="text-gray-400 text-xs">g</span>
                                    <span class="text-gray-400 text-xs line-through ml-1">600g</span>
                                </div>
                                <span class="text-xs text-gray-400">已兑 1200</span>
                            </div>
                        </div>
                    </div>

                    <!-- 商品2 -->
                    <div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm" data-id="2">
                        <div class="relative">
                            <img src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg" alt="商品图片" class="w-full h-28 object-cover">
                            <div class="absolute top-2 left-2 bg-orange-500 text-white text-xs px-2 py-0.5 rounded">
                                爆款
                            </div>
                        </div>
                        <div class="p-3">
                            <div class="text-gray-800 text-sm font-medium line-clamp-2 mb-2">校园食堂无门槛3元券</div>
                            <div class="flex items-center justify-between">
                                <div>
                                    <span class="text-emerald-600 font-bold">300</span>
                                    <span class="text-gray-400 text-xs">g</span>
                                    <span class="text-gray-400 text-xs line-through ml-1">500g</span>
                                </div>
                                <span class="text-xs text-gray-400">已兑 4800</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 更多商品 -->
            <div class="px-4 pt-4">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-gray-800 font-semibold text-base">更多好物</span>
                </div>
                <div class="space-y-3">
                    <!-- 商品3 -->
                    <div class="product-card bg-white rounded-2xl p-3 flex gap-3 shadow-sm" data-id="3">
                        <img src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg" alt="商品图片" class="w-24 h-24 rounded-xl object-cover">
                        <div class="flex-1 flex flex-col justify-between py-1">
                            <div>
                                <div class="text-gray-800 font-medium text-sm">"青碳行"限定联名环保杯套</div>
                                <div class="text-gray-400 text-xs mt-1">校园限定 · 限量 12 份</div>
                            </div>
                            <div class="flex items-center justify-between">
                                <div>
                                    <span class="text-emerald-600 font-bold text-lg">120</span>
                                    <span class="text-gray-400 text-xs">g</span>
                                </div>
                                <button class="quick-exchange-btn bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-xs">立即兑换</button>
                            </div>
                        </div>
                    </div>

                    <!-- 商品4 -->
                    <div class="product-card bg-white rounded-2xl p-3 flex gap-3 shadow-sm relative" data-id="4">
                        <div class="absolute -top-1 -right-1 bg-red-500 text-white text-xs px-2 py-0.5 rounded-bl-lg rounded-tr-xl">
                            限时
                        </div>
                        <img src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg" alt="商品图片" class="w-24 h-24 rounded-xl object-cover">
                        <div class="flex-1 flex flex-col justify-between py-1">
                            <div>
                                <div class="text-gray-800 font-medium text-sm">校园单车包月免费卡</div>
                                <div class="text-gray-400 text-xs mt-1">绿色出行 · 每月可兑</div>
                            </div>
                            <div class="flex items-center justify-between">
                                <div>
                                    <span class="text-emerald-600 font-bold text-lg">1500</span>
                                    <span class="text-gray-400 text-xs">g</span>
                                    <span class="text-gray-400 text-xs line-through ml-1">2000g</span>
                                </div>
                                <button class="quick-exchange-btn bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-xs">立即兑换</button>
                            </div>
                        </div>
                    </div>

                    <!-- 商品5 -->
                    <div class="product-card bg-white rounded-2xl p-3 flex gap-3 shadow-sm" data-id="5">
                        <img src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg" alt="商品图片" class="w-24 h-24 rounded-xl object-cover">
                        <div class="flex-1 flex flex-col justify-between py-1">
                            <div>
                                <div class="text-gray-800 font-medium text-sm">瑞幸咖啡5元抵扣券</div>
                                <div class="text-gray-400 text-xs mt-1">到店使用 · 全校通用</div>
                            </div>
                            <div class="flex items-center justify-between">
                                <div>
                                    <span class="text-emerald-600 font-bold text-lg">200</span>
                                    <span class="text-gray-400 text-xs">g</span>
                                    <span class="text-gray-400 text-xs line-through ml-1">500g</span>
                                </div>
                                <button class="quick-exchange-btn bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-xs">立即兑换</button>
                            </div>
                        </div>
                    </div>

                    <!-- 商品6 -->
                    <div class="product-card bg-white rounded-2xl p-3 flex gap-3 shadow-sm" data-id="6">
                        <img src="https://modao.cc/agent-py/media/generated_images/2026-03-29/37efc3dd161e40efaa15aad56c725951.jpg" alt="商品图片" class="w-24 h-24 rounded-xl object-cover">
                        <div class="flex-1 flex flex-col justify-between py-1">
                            <div>
                                <div class="text-gray-800 font-medium text-sm">环保帆布手提袋</div>
                                <div class="text-gray-400 text-xs mt-1">可循环使用 · 时尚环保</div>
                            </div>
                            <div class="flex items-center justify-between">
                                <div>
                                    <span class="text-emerald-600 font-bold text-lg">800</span>
                                    <span class="text-gray-400 text-xs">g</span>
                                    <span class="text-gray-400 text-xs line-through ml-1">1200g</span>
                                </div>
                                <button class="quick-exchange-btn bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-xs">立即兑换</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="h-4"></div>
        </div>

        <!-- 底部导航 -->
        <div class="bg-white border-t border-gray-100 px-4 py-2 flex items-center justify-around">
            <a href="index.html" class="flex flex-col items-center py-1 text-gray-400">
                <i class="ph-bold ph-house text-xl"></i>
                <span class="text-xs mt-0.5">首页</span>
            </a>
            <a href="checkin.html" class="flex flex-col items-center py-1 text-gray-400">
                <i class="ph-bold ph-check-square text-xl"></i>
                <span class="text-xs mt-0.5">打卡</span>
            </a>
            <a href="social.html" class="flex flex-col items-center py-1 text-gray-400">
                <i class="ph-bold ph-users text-xl"></i>
                <span class="text-xs mt-0.5">动态</span>
            </a>
            <a href="mall.html" class="flex flex-col items-center py-1 tab-active">
                <i class="ph-bold ph-storefront text-xl"></i>
                <span class="text-xs mt-0.5">商城</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center py-1 text-gray-400">
                <i class="ph-bold ph-user-circle text-xl"></i>
                <span class="text-xs mt-0.5">我的</span>
            </a>
        </div>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
