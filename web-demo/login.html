<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 碳路者·青碳行</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans SC', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background: #e2e8f0; }
    </style>
</head>
<body data-page="login">
    <div class="phone-container">
        <!-- 顶部状态栏 -->
        <div class="bg-emerald-600 px-4 py-3 flex items-center justify-between text-white">
            <div class="flex items-center gap-2">
                <span class="text-sm font-medium">2026年3月29日</span>
                <span class="text-xs opacity-80">晴</span>
            </div>
            <div class="flex items-center gap-1">
                <i class="ph-bold ph-cell-signal-full text-sm"></i>
                <i class="ph-bold ph-wifi-high text-sm"></i>
                <i class="ph-bold ph-battery-full text-sm"></i>
            </div>
        </div>

        <!-- 可滚动内容区 -->
        <div class="scrollable-content bg-white">
            <!-- Logo 和标题 -->
            <div class="pt-12 pb-8 text-center">
                <div class="w-20 h-20 mx-auto mb-4 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-3xl flex items-center justify-center shadow-lg">
                    <i class="ph-bold ph-leaf text-white text-4xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 mb-2">碳路者·青碳行</h1>
                <p class="text-gray-400 text-sm">低碳生活，从校园开始</p>
            </div>

            <!-- 登录表单 -->
            <div class="px-6">
                <!-- 手机号输入 -->
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2">手机号</label>
                    <div class="flex items-center border border-gray-200 rounded-xl overflow-hidden focus-within:border-emerald-500 focus-within:ring-2 focus-within:ring-emerald-100">
                        <div class="px-4 py-3 bg-gray-50 border-r border-gray-200 flex items-center gap-1">
                            <span class="text-gray-600 text-sm">+86</span>
                            <i class="ph-bold ph-caret-down text-gray-400 text-xs"></i>
                        </div>
                        <input type="tel" id="phone-input" placeholder="请输入手机号" maxlength="11" class="flex-1 px-4 py-3 outline-none text-gray-700 text-sm">
                    </div>
                </div>

                <!-- 验证码输入 -->
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-medium mb-2">验证码</label>
                    <div class="flex items-center gap-3">
                        <div class="flex-1 border border-gray-200 rounded-xl overflow-hidden focus-within:border-emerald-500 focus-within:ring-2 focus-within:ring-emerald-100">
                            <input type="text" id="code-input" placeholder="请输入验证码" maxlength="6" class="w-full px-4 py-3 outline-none text-gray-700 text-sm">
                        </div>
                        <button id="get-code-btn" class="bg-emerald-50 text-emerald-600 px-4 py-3 rounded-xl text-sm font-medium whitespace-nowrap">
                            获取验证码
                        </button>
                    </div>
                </div>

                <!-- 用户协议 -->
                <div class="flex items-start gap-2 mb-6">
                    <input type="checkbox" id="agree-checkbox" class="w-4 h-4 mt-0.5 rounded border-gray-300 text-emerald-500 focus:ring-emerald-500">
                    <label for="agree-checkbox" class="text-gray-500 text-xs leading-relaxed">
                        我已阅读并同意 <span class="text-emerald-600">《用户服务协议》</span> 和 <span class="text-emerald-600">《隐私政策》</span>
                    </label>
                </div>

                <!-- 登录按钮 -->
                <button id="login-btn" class="btn-primary w-full bg-emerald-500 text-white py-4 rounded-xl text-base font-semibold">
                    登录
                </button>

                <!-- 其他登录方式 -->
                <div class="mt-8">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="flex-1 h-px bg-gray-200"></div>
                        <span class="text-gray-400 text-xs">其他登录方式</span>
                        <div class="flex-1 h-px bg-gray-200"></div>
                    </div>
                    <div class="flex items-center justify-center gap-6">
                        <button class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-colors">
                            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                        </button>
                        <button class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-colors">
                            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/>
                            </svg>
                        </button>
                        <button class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-colors">
                            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.164 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 21.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 底部版权 -->
            <div class="text-center mt-8 pb-8">
                <p class="text-gray-400 text-xs">登录即表示同意我们的</p>
                <p class="text-gray-400 text-xs">服务条款和隐私政策</p>
            </div>
        </div>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
