<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 碳路者·青碳行</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans SC', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body data-page="cart">
    <div class="phone-container">
        <!-- 顶部状态栏 -->
        <div class="bg-white px-4 py-3 flex items-center justify-between border-b border-gray-100">
            <div class="text-gray-400 text-sm">2026年3月29日</div>
            <div class="flex items-center gap-1">
                <i class="ph-bold ph-cell-signal-full text-sm text-gray-600"></i>
                <i class="ph-bold ph-wifi-high text-sm text-gray-600"></i>
                <i class="ph-bold ph-battery-full text-sm text-gray-600"></i>
            </div>
        </div>

        <!-- 可滚动内容区 -->
        <div class="scrollable-content">
            <!-- 页面头部 -->
            <div class="bg-white px-4 pt-4 pb-3">
                <div class="flex items-center justify-between">
                    <a href="mall.html" class="text-gray-600">
                        <i class="ph-bold ph-arrow-left text-xl"></i>
                    </a>
                    <span class="text-gray-800 font-bold text-lg">购物车</span>
                    <a href="mall.html" class="text-emerald-600 text-sm">添加商品</a>
                </div>
            </div>

            <!-- 用户碳积分 -->
            <div class="px-4 py-3">
                <div class="bg-gradient-to-r from-slate-800 to-slate-900 rounded-3xl p-6 text-white shadow-xl flex justify-between items-center">
                    <div>
                        <div class="text-[10px] text-slate-400 mb-1">当前可用碳积分</div>
                        <div class="text-2xl font-bold">1,286</div>
                        <div class="text-[10px] text-emerald-400 mt-2 flex items-center">
                            <i class="ph-bold ph-arrow-up-right mr-1"></i>
                            比昨日增加 65g
                        </div>
                    </div>
                    <button class="bg-emerald-500 text-white text-[10px] font-bold px-4 py-2 rounded-full shadow-lg shadow-emerald-900/50">去赚积分</button>
                </div>
            </div>

            <!-- 购物车列表 -->
            <div class="px-4">
                <div id="cart-items-container" class="space-y-3">
                    <!-- 购物车商品会通过JS动态渲染 -->
                </div>

                <!-- 空购物车 -->
                <div id="cart-empty" class="hidden text-center py-16">
                    <div class="w-24 h-24 mx-auto bg-gray-100 rounded-full flex items-center justify-center mb-4">
                        <i class="ph-bold ph-shopping-cart text-4xl text-gray-300"></i>
                    </div>
                    <p class="text-gray-500 text-sm mb-4">购物车是空的</p>
                    <a href="mall.html" class="inline-block bg-emerald-500 text-white px-6 py-2 rounded-xl text-sm font-medium">
                        去逛逛
                    </a>
                </div>
            </div>

            <!-- 底部结算栏 -->
            <div id="cart-total-container" class="fixed bottom-20 left-0 right-0 bg-white border-t border-gray-100 px-4 py-3">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="select-all" class="w-5 h-5 rounded accent-emerald-500" checked>
                        <label for="select-all" class="text-gray-600 text-sm">全选</label>
                    </div>
                    <div class="text-right">
                        <div class="text-gray-400 text-xs">合计</div>
                        <div class="text-emerald-600 text-xl font-bold"><span id="total-price">0</span><span class="text-sm">g</span></div>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <div class="text-gray-400 text-xs">
                        已选 <span id="total-count">0</span> 件商品
                    </div>
                    <button id="checkout-btn" class="bg-emerald-500 text-white px-6 py-3 rounded-xl font-semibold">
                        立即兑换
                    </button>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bg-white border-t border-gray-100 px-4 py-2 flex items-center justify-around">
            <a href="index.html" class="flex flex-col items-center py-1 text-gray-400">
                <i class="ph-bold ph-house text-xl"></i>
                <span class="text-xs mt-0.5">首页</span>
            </a>
            <a href="checkin.html" class="flex flex-col items-center py-1 text-gray-400">
                <i class="ph-bold ph-check-square text-xl"></i>
                <span class="text-xs mt-0.5">打卡</span>
            </a>
            <a href="social.html" class="flex flex-col items-center py-1 text-gray-400">
                <i class="ph-bold ph-users text-xl"></i>
                <span class="text-xs mt-0.5">动态</span>
            </a>
            <a href="mall.html" class="flex flex-col items-center py-1 tab-active">
                <i class="ph-bold ph-storefront text-xl"></i>
                <span class="text-xs mt-0.5">商城</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center py-1 text-gray-400 relative">
                <i class="ph-bold ph-user-circle text-xl"></i>
                <span class="text-xs mt-0.5">我的</span>
                <span class="cart-badge absolute top-0 right-2 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </a>
        </div>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
