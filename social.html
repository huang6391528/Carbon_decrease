<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碳路者·青碳行 - 动态与排行</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans SC', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .tab-active { color: #10B981; }
    </style>
</head>
<body data-page="social">
    <div class="phone-container">
        <!-- 头部 Tabs (原型样式) -->
        <div class="px-6 pt-12 pb-4 bg-white flex justify-center space-x-12 border-b border-gray-50">
            <button class="text-base font-bold text-emerald-600 relative">
                排行
                <div class="absolute -bottom-1 left-0 w-full h-1 bg-emerald-500 rounded-full"></div>
            </button>
            <button class="text-base font-bold text-gray-400">
                动态墙
            </button>
        </div>

        <!-- 可滚动内容区 -->
        <div class="h-[650px] overflow-y-auto pb-24">
            <!-- 排行榜顶部三杰 -->
            <div class="flex justify-around items-end pt-8 pb-4 bg-gradient-to-b from-emerald-50 to-white px-4">
                <!-- 第二名 -->
                <div class="flex flex-col items-center">
                    <div class="relative">
                        <img alt="User" class="w-14 h-14 rounded-full border-2 border-slate-200" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/aebe9ded8268497fb80cf50f97790d42.jpg"/>
                        <div class="absolute -bottom-1 -right-1 bg-slate-400 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold">2</div>
                    </div>
                    <span class="text-[11px] font-bold mt-2">林悦</span>
                    <span class="text-[10px] text-gray-400">2,482g</span>
                </div>
                <!-- 第一名 -->
                <div class="flex flex-col items-center">
                    <i class="ph-bold ph-crown text-yellow-400 text-2xl mb-1"></i>
                    <div class="relative">
                        <img alt="User" class="w-20 h-20 rounded-full border-4 border-yellow-400 p-1" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/aebe9ded8268497fb80cf50f97790d42.jpg"/>
                        <div class="absolute -bottom-1 -right-1 bg-yellow-400 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">1</div>
                    </div>
                    <span class="text-sm font-bold mt-2">陈向东</span>
                    <span class="text-xs text-emerald-600 font-bold">3,120g</span>
                </div>
                <!-- 第三名 -->
                <div class="flex flex-col items-center">
                    <div class="relative">
                        <img alt="User" class="w-14 h-14 rounded-full border-2 border-orange-200" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/aebe9ded8268497fb80cf50f97790d42.jpg"/>
                        <div class="absolute -bottom-1 -right-1 bg-orange-400 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold">3</div>
                    </div>
                    <span class="text-[11px] font-bold mt-2">张子萱</span>
                    <span class="text-[10px] text-gray-400">1,965g</span>
                </div>
            </div>

            <!-- 详细排名列表 -->
            <div class="mt-6 px-6 space-y-5">
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <span class="text-sm font-bold text-gray-400 w-6">4</span>
                        <img alt="User" class="w-10 h-10 rounded-full ml-2" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/aebe9ded8268497fb80cf50f97790d42.jpg"/>
                        <div class="ml-3">
                            <div class="text-sm font-bold text-gray-800">李浩</div>
                            <div class="text-[10px] text-gray-400">步行 1.2w 步</div>
                        </div>
                    </div>
                    <span class="text-sm font-bold text-gray-700">1,842g</span>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <span class="text-sm font-bold text-gray-400 w-6">5</span>
                        <img alt="User" class="w-10 h-10 rounded-full ml-2" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/aebe9ded8268497fb80cf50f97790d42.jpg"/>
                        <div class="ml-3">
                            <div class="text-sm font-bold text-gray-800">王语嫣</div>
                            <div class="text-[10px] text-gray-400">公交出行 4 次</div>
                        </div>
                    </div>
                    <span class="text-sm font-bold text-gray-700">1,650g</span>
                </div>
                <div class="flex items-center justify-between bg-emerald-50 -mx-6 px-6 py-3 border-y border-emerald-100">
                    <div class="flex items-center">
                        <span class="text-sm font-bold text-emerald-600 w-6">12</span>
                        <img alt="User" class="w-10 h-10 rounded-full ml-2 border-2 border-emerald-400" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/dcd31a5496fe4151ba6851123f2f3cfa.jpg"/>
                        <div class="ml-3">
                            <div class="text-sm font-bold text-gray-800">我 (小碳)</div>
                            <div class="text-[10px] text-gray-400">今日累计打卡 4 次</div>
                        </div>
                    </div>
                    <span class="text-sm font-bold text-emerald-600 carbon-score">1,286g</span>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <span class="text-sm font-bold text-gray-400 w-6">6</span>
                        <img alt="User" class="w-10 h-10 rounded-full ml-2" src="https://modao.cc/agent-py/media/generated_images/2026-03-29/aebe9ded8268497fb80cf50f97790d42.jpg"/>
                        <div class="ml-3">
                            <div class="text-sm font-bold text-gray-800">赵明</div>
                            <div class="text-[10px] text-gray-400">旧物捐赠达人</div>
                        </div>
                    </div>
                    <span class="text-sm font-bold text-gray-700">1,420g</span>
                </div>
            </div>

            <!-- 校园竞赛卡片 -->
            <div class="mx-4 mt-8 bg-blue-50 rounded-3xl p-6 border border-blue-100 relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex items-center space-x-2 mb-2">
                        <span class="bg-blue-600 text-white text-[8px] font-bold px-1.5 py-0.5 rounded">进行中</span>
                        <h3 class="text-sm font-bold text-blue-900">2026 校园减碳PK赛</h3>
                    </div>
                    <p class="text-xs text-blue-700 mb-4">当前进度：清华 VS 北大</p>
                    <div class="flex items-center space-x-2">
                        <div class="flex-1 h-2 bg-blue-200 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-600" style="width: 65%"></div>
                        </div>
                        <span class="text-[10px] font-bold text-blue-800">65%</span>
                    </div>
                </div>
                <i class="ph-bold ph-flag-banner absolute -bottom-4 -right-4 text-7xl text-blue-100 rotate-12"></i>
            </div>
        </div>

        <!-- 底部 TabBar -->
        <div class="absolute bottom-0 w-full h-20 bg-white border-t border-gray-100 px-6 flex justify-between items-center pb-4">
            <a class="flex flex-col items-center text-gray-400" href="index.html">
                <i class="ph-bold ph-house text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">首页</span>
            </a>
            <a class="flex flex-col items-center text-gray-400" href="checkin.html">
                <i class="ph-bold ph-calendar-check text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">打卡</span>
            </a>
            <a class="flex flex-col items-center tab-active" href="social.html">
                <i class="ph-bold ph-users-three text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">动态</span>
            </a>
            <a class="flex flex-col items-center text-gray-400 relative" href="mall.html">
                <i class="ph-bold ph-shopping-bag text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">商城</span>
                <span class="cart-badge absolute top-0 right-2 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </a>
            <a class="flex flex-col items-center text-gray-400" href="profile.html">
                <i class="ph-bold ph-user text-2xl"></i>
                <span class="text-[10px] mt-1 font-medium">我的</span>
            </a>
        </div>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
